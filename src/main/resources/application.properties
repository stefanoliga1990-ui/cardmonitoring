spring.application.name=cardmonitoring
spring.profiles.default=local

server.port=${PORT:8080}
server.max-http-request-header-size=${MAX_HTTP_REQUEST_HEADER_SIZE:16KB}
server.tomcat.max-http-form-post-size=${MAX_HTTP_FORM_POST_SIZE:64KB}
server.tomcat.max-swallow-size=${MAX_HTTP_SWALLOW_SIZE:64KB}
app.http.max-json-request-size=${MAX_JSON_REQUEST_SIZE:64KB}

spring.datasource.url=jdbc:h2:file:${CARDMONITORING_DATA_PATH:./data}/cardmonitoring
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
spring.servlet.multipart.enabled=false
spring.mvc.async.request-timeout=${ASYNC_REQUEST_TIMEOUT:35s}

cardtrader.base-url=https://api.cardtrader.com/api/v2
cardtrader.token=${CARDTRADER_TOKEN:}
cardtrader.connect-timeout=${CARDTRADER_CONNECT_TIMEOUT:5s}
cardtrader.read-timeout=${CARDTRADER_READ_TIMEOUT:30s}
cardtrader.expected-currency=${CARDTRADER_EXPECTED_CURRENCY:EUR}

pokemontcg.base-url=https://api.pokemontcg.io/v2
pokemontcg.api-key=${POKEMONTCG_API_KEY:}
pokemontcg.connect-timeout=${POKEMONTCG_CONNECT_TIMEOUT:5s}
pokemontcg.read-timeout=${POKEMONTCG_READ_TIMEOUT:15s}

cardmonitoring.tools.image-backfill.enabled=${CARDMONITORING_TOOLS_IMAGE_BACKFILL_ENABLED:false}
cardmonitoring.tools.image-backfill.delay=${CARDMONITORING_TOOLS_IMAGE_BACKFILL_DELAY:5s}
cardmonitoring.tools.image-backfill.retry-delay=${CARDMONITORING_TOOLS_IMAGE_BACKFILL_RETRY_DELAY:1s}
cardmonitoring.tools.image-backfill.max-attempts=${CARDMONITORING_TOOLS_IMAGE_BACKFILL_MAX_ATTEMPTS:3}

telegram.enabled=${TELEGRAM_ENABLED:false}
telegram.base-url=https://api.telegram.org
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.bot-username=${TELEGRAM_BOT_USERNAME:}
telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:}
telegram.app-public-url=${APP_PUBLIC_URL:}
telegram.connect-timeout=${TELEGRAM_CONNECT_TIMEOUT:5s}
telegram.read-timeout=${TELEGRAM_READ_TIMEOUT:15s}

monitoring.scheduler.cron=${MONITORING_SCHEDULER_CRON:0 0 3 * * MON}
monitoring.scheduler.time-zone=${MONITORING_SCHEDULER_TIME_ZONE:Europe/Rome}

management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health
management.endpoints.web.discovery.enabled=false
management.endpoint.health.show-details=never
